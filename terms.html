<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms & Conditions - Harvion Labs</title>
<link rel="icon" type="image/png" href="E:\HARVION_AI\logo.jpg">
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }
        h1 {
            color: #00f2fe;
            border-bottom: 2px solid #1f2937;
            padding-bottom: 10px;
            font-size: 28px;
        }
        .dynamic-section h2 {
            color: #4facfe;
            margin-top: 25px;
            font-size: 20px;
        }
        .dynamic-section p {
            color: #9ca3af;
            font-size: 15px;
        }
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            color: #4facfe;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Terms and Conditions</h1>
        <p><strong>Effective Date:</strong> <span id="legal-date">Loading...</span></p>
        
        <div id="dynamic-terms-container" class="dynamic-section"></div>
        
        <a href="index.html" class="btn-back">← Back to Harvion AI</a>
    </div>

    <script src="assets/terms-data.js"></script>
    <script>
        // 1. Date update karna
        document.getElementById('legal-date').innerText = termsConfig.effectiveDate;

        // 2. Saare sections ko loop chala kar render karna
        const container = document.getElementById('dynamic-terms-container');
        
        termsConfig.sections.forEach(item => {
            // Heading banana
            const heading = document.createElement('h2');
            heading.innerHTML = item.title;
            
            // Paragraph banana
            const paragraph = document.createElement('p');
            paragraph.innerHTML = item.content;
            
            // Container mein jodna
            container.appendChild(heading);
            container.appendChild(paragraph);
        });
    </script>
</body>
</html>
